<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Almentor — Operations Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── Top Bar ── -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="logo-mark">
        <span class="logo-a">A</span>
      </div>
      <div class="brand-text">
        <span class="brand-name">almentor</span>
        <span class="brand-sub">Operations Intelligence</span>
      </div>
    </div>

    <div class="topbar-right">
      <div class="sync-badge" id="syncBadge">
        <span class="sync-dot"></span>
        <span class="sync-label" id="syncLabel">Connecting…</span>
      </div>
      <div class="last-updated" id="lastUpdated">—</div>
    </div>
  </header>

  <!-- ── Tab Navigation ── -->
  <nav class="tab-nav">
    <div class="tab-nav-inner">
      <button class="tab-btn active" data-tab="tab1" id="btnTab1">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Management Overview
      </button>
      <button class="tab-btn" data-tab="tab2" id="btnTab2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Project Details
      </button>
    </div>
  </nav>

  <!-- ── Main Content ── -->
  <main class="main-content">

    <!-- KPI Strip -->
    <section class="kpi-strip" id="kpiStrip">
      <div class="kpi-card" id="kpiProjects">
        <div class="kpi-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="kpi-data">
          <span class="kpi-value" id="valProjects">—</span>
          <span class="kpi-label">Total Projects</span>
        </div>
      </div>
      <div class="kpi-card" id="kpiTasks">
        <div class="kpi-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="kpi-data">
          <span class="kpi-value" id="valTasks">—</span>
          <span class="kpi-label">Total Tasks</span>
        </div>
      </div>
      <div class="kpi-card" id="kpiTables">
        <div class="kpi-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        </div>
        <div class="kpi-data">
          <span class="kpi-value" id="valTables">—</span>
          <span class="kpi-label">Data Sections</span>
        </div>
      </div>
    </section>

    <!-- Tables Area -->
    <section class="tables-area" id="tablesArea">
      <div class="loading-state" id="loadingState">
        <div class="loader-ring"></div>
        <p>Fetching data…</p>
      </div>
      <div class="error-state hidden" id="errorState">
        <div class="error-icon">⚠</div>
        <h3>Unable to reach data source</h3>
        <p id="errorMsg">Check your connection or proxy URL.</p>
        <button class="retry-btn" onclick="fetchTab(activeTab)">Retry</button>
      </div>
      <div class="tables-grid" id="tablesGrid"></div>
    </section>

  </main>

  <footer class="footer">
    <span>© <span id="footerYear"></span> Almentor · Operations Dashboard</span>
    <span class="footer-tech">Auto-refresh every 15 s</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
