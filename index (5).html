<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almentor | Error Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Almentor <span>Quality Assurance</span></div>
        <div class="status-box">
            <span id="sync-dot" class="dot"></span>
            <span id="sync-text">Live Sync</span>
        </div>
    </nav>

    <div class="controls">
        <div class="tabs">
            <button class="tab-btn active" onclick="changeTab('tab1')">Primary Tracker (Tab 1)</button>
            <button class="tab-btn" onclick="changeTab('tab2')">Secondary Tracker (Tab 2)</button>
        </div>
    </div>

    <main id="dashboard" class="container">
        <div class="loader" id="loader">Fetching data from Google Sheets...</div>
        </main>

    <script src="script.js"></script>
</body>
</html>
